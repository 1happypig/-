        - generic [ref=e133]:
          - paragraph [ref=e135]: There's been plenty of discussion surrounding the size of the maps in Black Ops 6, but are they really smaller than we think?
          - paragraph [ref=e136]:
            - text: "Since the release of the Call of Duty: Black Ops 6 (BO6) multiplayer beta, there’s been some discourse surrounding the"
            - link "launch maps" [ref=e137] [cursor=pointer]:
              - /url: https://esports.gg/news/call-of-duty/how-many-multiplayer-maps-in-black-ops-6/
            - text: . Treyarch has stated numerous times there’s been a clear intention to design smaller to medium-sized maps for multiplayer, which was overly apparent in the beta.
          - paragraph [ref=e138]: Every single map in the BO6 beta was fairly small, with the largest map being Rewind. Rewind would be considered a smaller map in most other Call of Duty titles. While the maps in BO6 are certainly on the smaller side, just how small are they compared to classic maps like Nuketown and Raid? One YouTuber dissected every multiplayer map, including the ones we haven’t seen yet, to give us a clear picture of where things stand.
          - heading "Sizes of all Black Ops 6 multiplayer maps" [level=2] [ref=e139]
          - paragraph [ref=e140]:
            - text: Call of Duty YouTuber XclusiveAce decided to give their audience an overview of how every launch map in BO6 compares to Nuketown, one of the smallest Treyarch maps.
            - link "XclusiveAce made this video" [ref=e141] [cursor=pointer]:
              - /url: https://www.youtube.com/watch?v=PaVLx6GBIsg
            - text: to debunk some rumors and false information that are being spread by other YouTubers who used incorrect data to determine the sizes of BO6’s maps.
          - paragraph [ref=e142]: According to these other YouTubers, the maps in BO6 are just barely bigger, and sometimes even considerably smaller, than Nuketown. While it’s true some core 6v6 maps are smaller than Nuketown, a majority of the maps are 2-3x times larger than Nuketown, which is what XclusiveAce calculated in their video.
          - figure [ref=e143]:
            - iframe [ref=e145]:
              
          - paragraph [ref=e146]: XclusiveAce measured how wide both Nuketown and Raid are by using their Black Ops Cold War versions. He then used those measurements and compared to them the beta maps in BO6 and the other launch maps we haven’t seen much gameplay of yet. However, we do have the map overview for those other maps, which gives us a rough idea of how large they are.
          - paragraph [ref=e147]: "According to XclusiveAce, who mentioned some of the map sizes could be off to a varying degree, here is how every BO6 map stacks up to Nuketown — and Raid in one case:"
          - list [ref=e148]:
            - listitem [ref=e149]: "Rewind: 3.43x larger than Nuketown"
            - listitem [ref=e150]: "Protocol: 2.89x larger than Nuketown"
            - listitem [ref=e151]: "Scud: 2.31x larger than Nuketown"
            - listitem [ref=e152]: "Derelict: 1.55x larger than Nuketown"
            - listitem [ref=e153]: "Skyline: 1.64x larger than Nuketown"
            - listitem [ref=e154]: "Babylon: 22% smaller than Nuketown"
            - listitem [ref=e155]: "Vault: Roughly 3.38x larger than Nuketown"
            - listitem [ref=e156]: "Lowtown: Roughly 2.09x larger than Nuketown"
            - listitem [ref=e157]: "Vorkuta: Roughly 3.48x larger than Nuketown and roughly 1.21x larger than Raid"
            - listitem [ref=e158]: "Red Card: Roughly 3.48x larger than Nuketown"
            - listitem [ref=e159]: "Subsonic: Roughly 1.13x larger than Nuketown"
            - listitem [ref=e160]: "Payback: Roughly 39% smaller than Nuketown (could be wrong)"
          - paragraph [ref=e161]: If you’re wondering why only 12 out of the 16 launch maps are listed, the four remaining maps in BO6 are Strike maps. While these can be played in 6v6, they’re primarily meant for 2v2 gameplay, so they’re designed to be as small or smaller than Nuketown.
          - paragraph [ref=e162]: Out of the 12 remaining 6v6 maps, only two are smaller than Nuketown. Some are close to the same size, like Subsonic and Skyline, but a majority are noticeably larger. These measurements also don’t account for any verticality on maps, which increases the total playing area by a wide margin in some cases. Treyarch has indeed designed much smaller maps than we’re used to in BO6, but these measurements prove that there are still medium-sized maps available in multiplayer.
          - paragraph [ref=e163]:
            - text: If you’re a Zombies fan, then make sure to check out our overview of the
            - link "Terminus" [ref=e164] [cursor=pointer]:
              - /url: https://esports.gg/news/call-of-duty/black-ops-6-the-zombie-map-terminus-explained/
            - text: and
            - link "Liberty Falls" [ref=e165] [cursor=pointer]:
              - /url: https://esports.gg/news/call-of-duty/cod-black-ops-6-zombies-liberty-falls-details/
            - text: maps. For all other BO6 content, keep up with our
            - link "Call of Duty section" [ref=e166] [cursor=pointer]:
              - /url: https://esports.gg/games/call-of-duty/
            - text: as we draw closer to launch on Oct. 25.
