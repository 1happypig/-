                - code [ref=e175]: ~/.pi/agent/sessions/
                - text: (Pi).
              - listitem [ref=e176]:
                - strong [ref=e177]: Environment variables
                - text: ": Provider subprocesses inherit the Obsidian process environment plus any variables you configure in Claudian. This is needed for CLI authentication, proxies, certificates, and PATH resolution."
              - listitem [ref=e178]:
                - strong [ref=e179]: Device-specific paths
                - text: ": Per-device CLI paths use an opaque local key stored in browser local storage, not your system hostname."
              - listitem [ref=e180]:
                - strong [ref=e181]: Background activity
                - text: ": Claudian does not run telemetry beacons. UI polling timers read local Obsidian/editor selection state only. Network activity is limited to explicit provider runtime work, configured MCP endpoints, and provider SDK/CLI calls needed to answer your requests."
            - heading "Troubleshooting" [level=2] [ref=e182]
            - heading "Claude CLI not found" [level=3] [ref=e183]
            - paragraph [ref=e184]:
              - text: If you encounter
              - code [ref=e185]: spawn claude ENOENT
              - text: or
              - code [ref=e186]: Claude CLI not found
              - text: ", the plugin can't auto-detect your Claude installation. Common with Node version managers (nvm, fnm, volta)."
            - paragraph [ref=e187]:
              - strong [ref=e188]: Solution
              - text: ": Leave the setting empty first so Claudian can auto-detect Claude Code. If auto-detection fails, find your CLI path and set it in Settings → Advanced → Claude CLI path."
