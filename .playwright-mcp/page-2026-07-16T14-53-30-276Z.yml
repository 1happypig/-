            - heading "Architecture" [level=2] [ref=e240]
            - code [ref=e242]: "src/ ├── main.ts # Plugin entry point ├── app/ # Shared defaults and plugin-level storage ├── core/ # Provider-neutral runtime, registry, and type contracts │ ├── runtime/ # ChatRuntime interface and approval types │ ├── providers/ # Provider registry and workspace services │ ├── auxiliary/ # Shared provider auxiliary services │ ├── bootstrap/ # Plugin bootstrap wiring │ ├── security/ # Approval utilities │ └── ... # commands, mcp, prompt, storage, tools, types ├── providers/ │ ├── claude/ # Claude SDK adaptor, prompt encoding, storage, MCP, plugins │ ├── codex/ # Codex app-server adaptor, JSON-RPC transport, JSONL history │ ├── opencode/ # Opencode adaptor │ ├── pi/ # Pi RPC adaptor, model discovery, JSONL history │ └── acp/ # Agent Client Protocol shared transport ├── features/ │ ├── chat/ # Sidebar chat: tabs, controllers, renderers │ ├── inline-edit/ # Inline edit modal and provider-backed edit services │ └── settings/ # Settings shell with provider tabs ├── shared/ # Reusable UI components and modals ├── i18n/ # Internationalization (10 locales) ├── types/ # Shared ambient types ├── utils/ # Cross-cutting utilities └── style/ # Modular CSS"
