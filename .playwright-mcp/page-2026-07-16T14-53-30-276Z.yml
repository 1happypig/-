            - heading "Privacy & Data Use" [level=2] [ref=e164]
            - list [ref=e165]:
              - listitem [ref=e166]:
                - strong [ref=e167]: Sent to API
                - text: ": Your input, attached files, images, and tool call outputs. Default: Anthropic (Claude), OpenAI (Codex), or the provider configured in Opencode/Pi; configurable via provider settings and environment variables."
              - listitem [ref=e168]:
                - strong [ref=e169]: Local storage
                - text: ": Claudian settings and session metadata in"
                - code [ref=e170]: vault/.claudian/
                - text: ; Claude provider files in
                - code [ref=e171]: vault/.claude/
                - text: ; transcripts in
                - code [ref=e172]: ~/.claude/projects/
                - text: (Claude),
                - code [ref=e173]: ~/.codex/sessions/
                - text: (Codex), and
                - code [ref=e174]: .pi/agent/sessions/
