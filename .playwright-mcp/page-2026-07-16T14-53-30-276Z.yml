            - paragraph [ref=e83]:
              - img "Preview" [ref=e84]
            - paragraph [ref=e85]: An Obsidian plugin that embeds AI coding agents (Claude Code, Codex, Opencode, Pi, and more to come) in your vault. Your vault becomes the agent's working directory — file read/write, search, bash, and multi-step workflows all work out of the box.
            - heading "Features & Usage" [level=2] [ref=e86]
            - paragraph [ref=e87]: Open the chat sidebar from the ribbon icon or command palette. Select text and use the hotkey for inline edit. Everything works like your familiar coding agent, Claude Code, Codex, Opencode, and Pi — talk to the agent, and it reads, writes, edits, and searches files in your vault.
            - paragraph [ref=e88]:
              - strong [ref=e89]: Inline Edit
              - text: — Select text or start at the cursor position + hotkey to edit directly in notes with word-level diff preview.
            - paragraph [ref=e90]:
              - strong [ref=e91]: Slash Commands & Skills
              - text: — Type
              - code [ref=e92]: /
              - text: or
              - code [ref=e93]: $
              - text: for reusable prompt templates or Skills from user- and vault-level scopes.
            - paragraph [ref=e94]:
              - strong [ref=e95]:
                - code [ref=e96]: "@mention"
              - text: "- Type"
              - code [ref=e97]: "@"
              - text: to mention anything you want the agent to work with, vault files, subagents, MCP servers, or files in external directories.
            - paragraph [ref=e98]:
              - strong [ref=e99]: Plan Mode
              - text: — Toggle via
              - code [ref=e100]: Shift+Tab
              - text: . The agent explores and designs before implementing, then presents a plan for approval.
            - paragraph [ref=e101]:
              - strong [ref=e102]:
                - text: Instruction Mode (
                - code [ref=e103]: "#"
                - text: )
              - text: — Refined custom instructions added from the chat input.
            - paragraph [ref=e104]:
              - strong [ref=e105]: MCP Servers
              - text: — Connect external tools via Model Context Protocol (stdio, SSE, HTTP). Claude manages vault MCP in-app; Codex uses its own CLI-managed MCP configuration.
            - paragraph [ref=e106]:
